controllers = []
app_index = []

[fleet]
name = "scaling_probe"

[roles.root]
kind = "root"
package = "../root_probe"

[roles.scale_hub]
kind = "canister"
package = "."

[roles.scale_replica]
kind = "canister"
package = "../../../fleets/test/scale"

[auth.delegated_tokens]
enabled = false

[subnets.prime]

[subnets.prime.canisters.root]
kind = "root"

[subnets.prime.canisters.scale_hub]
kind = "service"

[subnets.prime.canisters.scale_hub.scaling.pools.scales]
canister_role = "scale_replica"
policy.initial_workers = 0
policy.min_workers = 2

[subnets.prime.canisters.scale_replica]
kind = "replica"
