# ================================================================
#  CANIC CONFIGURATION
# ================================================================

# ----------------------------------------------------------------
# Global Settings
# ----------------------------------------------------------------
controllers = []
app_directory = ["user_hub", "scale_hub", "shard_hub"]

[app]
init_mode = "enabled"
[app.whitelist]

[auth.delegated_tokens]
# Root-signed delegated token auth (cert -> proof -> token).
enabled = true
ecdsa_key_name = "test_key_1"


# ----------------------------------------------------------------
# Standards
# ----------------------------------------------------------------

[standards]
icrc21 = true # Enable ICRC-21 capability

# ----------------------------------------------------------------
# Subnet Definitions
# ----------------------------------------------------------------
# Each subnet defines how its canisters behave and when they top up.
# ----------------------------------------------------------------

# ================================================================
#  PRIME SUBNET
# ================================================================
[subnets.prime]
auto_create = ["app", "user_hub", "scale_hub", "shard_hub", "test"]
subnet_directory = ["app", "user_hub", "scale_hub", "shard_hub", "test"]
pool.minimum_size = 3

# --- Root ---
[subnets.prime.canisters.root]
kind = "root"

# --- App ---
[subnets.prime.canisters.app]
kind = "singleton"

# --- User Hub ---
[subnets.prime.canisters.user_hub]
kind = "singleton"

# --- User Hub Pools ---
[subnets.prime.canisters.user_hub.sharding.pools.user_shards]
canister_role = "user_shard"
policy.capacity = 100
policy.max_shards = 4

# --- User Shard ---
[subnets.prime.canisters.user_shard]
kind = "shard"

[subnets.prime.canisters.user_shard.delegated_auth]
signer = true
verifier = true

# --- Minimal ---
[subnets.prime.canisters.minimal]
kind = "replica"

# --- Scale Hub ---
[subnets.prime.canisters.scale_hub]
kind = "singleton"
topup_policy.threshold = "10T"
topup_policy.amount = "4T"

# --- Scale Hub Pools ---
[subnets.prime.canisters.scale_hub.scaling.pools.scales]
canister_role = "scale"
policy.min_workers = 2

# --- Scale ---
[subnets.prime.canisters.scale]
kind = "replica"

# --- Shard Hub ---
[subnets.prime.canisters.shard_hub]
kind = "singleton"
topup_policy.threshold = "10T"
topup_policy.amount = "4T"

# --- Shard Hub Pools ---
[subnets.prime.canisters.shard_hub.sharding.pools.shards]
canister_role = "shard"
policy.capacity = 100
policy.max_shards = 4

# --- Shard ---
[subnets.prime.canisters.shard]
kind = "shard"
topup_policy.threshold = "10T"
topup_policy.amount = "4T"


# --- Test ---
[subnets.prime.canisters.test]
kind = "singleton"

[subnets.prime.canisters.test.delegated_auth]
verifier = true

# ================================================================
#  GENERAL SUBNET
# ================================================================
[subnets.general]

# --- Minimal Canister ---
[subnets.general.canisters.minimal]
kind = "replica"
