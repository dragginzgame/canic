[package]
name = "canister_user_shard"
edition = { workspace = true }
rust-version = { workspace = true }
version = { workspace = true }
publish = false
build = "../build.rs"

[package.metadata.cargo-machete]
ignored = ["candid", "ic-cdk"]

[package.metadata.canic]
app = "test"
role = "user_shard"

[lib]
crate-type = ["cdylib"]

[dependencies]
candid = { workspace = true }
canic = { workspace = true, features = ["auth-delegated-token-verify", "auth-issuer-canister-sig-create", "auth-root-canister-sig-verify", "metrics"] }
ic-cdk = { workspace = true }

[build-dependencies]
canic = { workspace = true, features = [] }

[lints]
workspace = true
