[package]
name = "canister_user_hub"
edition = { workspace = true }
rust-version = { workspace = true }
version = { workspace = true }
publish = false
build = "../build.rs"

[package.metadata.cargo-machete]
ignored = ["ic-cdk"]

[package.metadata.canic]
app = "test"
role = "user_hub"

[lib]
crate-type = ["cdylib"]

[dependencies]
candid = { workspace = true }
canic = { workspace = true, features = ["auth-delegated-token-verify", "metrics", "sharding"] }
ic-cdk = { workspace = true }

[build-dependencies]
canic = { workspace = true, features = [] }

[lints]
workspace = true
