[package]
name = "demo_fleet_root"
edition = { workspace = true }
rust-version = { workspace = true }
version = { workspace = true }
publish = false
build = "../build.rs"

[package.metadata.cargo-machete]
ignored = ["candid", "ic-cdk"]

[package.metadata.canic]
app = "demo"
role = "root"

[lib]
crate-type = ["cdylib"]

[dependencies]
candid = { workspace = true }
canic = { workspace = true, features = ["control-plane", "metrics"] }
ic-cdk = { workspace = true }

[build-dependencies]
canic = { workspace = true, features = [] }

[lints]
workspace = true
