canisters:
  - name: root
    build:
      steps:
        - type: script
          commands:
            - cargo run -q -p canic-host --example build_artifact -- root

  - name: app
    build:
      steps:
        - type: script
          commands:
            - cargo run -q -p canic-host --example build_artifact -- app

  - name: user_hub
    build:
      steps:
        - type: script
          commands:
            - cargo run -q -p canic-host --example build_artifact -- user_hub

  - name: user_shard
    build:
      steps:
        - type: script
          commands:
            - cargo run -q -p canic-host --example build_artifact -- user_shard

  - name: scale_hub
    build:
      steps:
        - type: script
          commands:
            - cargo run -q -p canic-host --example build_artifact -- scale_hub

  - name: scale_replica
    build:
      steps:
        - type: script
          commands:
            - cargo run -q -p canic-host --example build_artifact -- scale_replica

environments:
  - name: demo
    network: local
    canisters: [root, app]

  - name: test
    network: local
    canisters: [root, app, user_hub, user_shard, scale_hub, scale_replica]
