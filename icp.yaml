canisters:
  - name: root
    build:
      steps:
        - type: script
          commands:
            - CARGO_INCREMENTAL=0 cargo run -q --profile fast -p canic-host --example build_artifact -- root release . . fleets/test/canic.toml

  - name: app
    build:
      steps:
        - type: script
          commands:
            - CARGO_INCREMENTAL=0 cargo run -q --profile fast -p canic-host --example build_artifact -- app release . . fleets/test/canic.toml

  - name: scale_hub
    build:
      steps:
        - type: script
          commands:
            - CARGO_INCREMENTAL=0 cargo run -q --profile fast -p canic-host --example build_artifact -- scale_hub release . . fleets/test/canic.toml

  - name: scale_replica
    build:
      steps:
        - type: script
          commands:
            - CARGO_INCREMENTAL=0 cargo run -q --profile fast -p canic-host --example build_artifact -- scale_replica release . . fleets/test/canic.toml

  - name: user_hub
    build:
      steps:
        - type: script
          commands:
            - CARGO_INCREMENTAL=0 cargo run -q --profile fast -p canic-host --example build_artifact -- user_hub release . . fleets/test/canic.toml

  - name: user_shard
    build:
      steps:
        - type: script
          commands:
            - CARGO_INCREMENTAL=0 cargo run -q --profile fast -p canic-host --example build_artifact -- user_shard release . . fleets/test/canic.toml

networks:
  - name: local
    mode: managed
    version: "v13.0.0-2026-05-07-04-27"
    gateway:
      bind: 127.0.0.1
      port: 8001

environments:
  - name: demo
    network: local
    canisters: [root, app, user_hub, user_shard]

  - name: test
    network: local
    canisters: [root, app, scale_hub, scale_replica, user_hub, user_shard]
