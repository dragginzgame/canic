# Minimal Canic demo fleet for quick root-plus-app experiments.

controllers = []
app_index = []

[fleet]
name = "demo"

[auth.delegated_tokens]
enabled = false

[subnets.prime]
auto_create = ["app"]
subnet_index = ["app"]

[subnets.prime.canisters.root]
kind = "root"

[subnets.prime.canisters.app]
kind = "singleton"
