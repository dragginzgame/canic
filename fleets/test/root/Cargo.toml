[package]
name = "canister_root"
edition = { workspace = true }
rust-version = { workspace = true }
version = { workspace = true }
publish = false
build = "../build.rs"

[package.metadata.cargo-machete]
ignored = ["candid", "ic-cdk"]

[package.metadata.canic]
fleet = "test"
role = "root"

[lib]
crate-type = ["cdylib"]

[dependencies]
candid = { workspace = true }
canic = { workspace = true, features = ["auth-chain-key-root-sign", "auth-root-canister-sig-create", "control-plane"] }
ic-cdk = { workspace = true }

[build-dependencies]
canic = { workspace = true }
sha2 = { workspace = true }

[lints]
workspace = true
