controllers = []
app_index = ["user_hub"]

[fleet]
name = "test"

[roles.root]
kind = "root"
package = "../root"

[roles.user_hub]
kind = "canister"
package = "../user_hub"

[roles.user_shard]
kind = "canister"
package = "../user_shard"

[roles.test]
kind = "canister"
package = "../test"

[app]
init_mode = "enabled"

[app.whitelist]

[auth.delegated_tokens]
enabled = true

[standards]
icrc21 = true

[subnets.prime]
pool.minimum_size = 3

[subnets.prime.canisters.root]
kind = "root"

[subnets.prime.canisters.user_hub]
kind = "service"
topup = {}

[subnets.prime.canisters.user_hub.sharding.pools.user_shards]
canister_role = "user_shard"
policy.capacity = 100
policy.max_shards = 4

[subnets.prime.canisters.user_shard]
kind = "shard"
topup = {}

[subnets.prime.canisters.user_shard.auth]
delegated_token_signer = true
role_attestation_cache = true

[subnets.prime.canisters.test]
kind = "service"

[subnets.prime.canisters.test.auth]
role_attestation_cache = true

[subnets.general]
