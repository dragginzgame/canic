controllers = []
app_index = ["user_hub"]

[fleet]
name = "test"

[roles.root]
kind = "root"
package = "../root"

[roles.user_hub]
kind = "canister"
package = "../user_hub"

[roles.user_shard]
kind = "canister"
package = "../user_shard"

[roles.test]
kind = "canister"
package = "../test"

[app]
init_mode = "enabled"

[app.whitelist]

[auth.delegated_tokens]
enabled = true
build_network = "local"
root_proof_mode = "chain_key_batch"

[auth.delegated_tokens.chain_key_root_proof]
key_id = "key_1"
derivation_path_hash_hex = "fe51a87b988d221227b134c48f36787e891a902dcb5d48ea5f94cff8bfed5a16"
derivation_path_hex = ["63616e6963", "64656c65676174696f6e"]
public_key_hex = "02f1a0a900c4b9d53ff5ec024c0e37e7a54174c6ae1d0a77312aebea349adc0b7a"
key_version = 1
min_accepted_key_version = 1
min_accepted_proof_epoch = 1
min_accepted_registry_epoch = 1
valid_from_ns = 0
accept_until_ns = 4102444800000000000
max_revocation_latency_ns = 60000000000

[standards]
icrc21 = true

[subnets.prime]
pool.minimum_size = 3

[subnets.prime.canisters.root]
kind = "root"

[subnets.prime.canisters.user_hub]
kind = "service"
topup = {}

[subnets.prime.canisters.user_hub.sharding.pools.user_shards]
canister_role = "user_shard"
policy.capacity = 100
policy.max_shards = 4

[subnets.prime.canisters.user_shard]
kind = "shard"
topup = {}

[subnets.prime.canisters.user_shard.auth]
delegated_token_issuer = true
role_attestation_cache = true

[subnets.prime.canisters.test]
kind = "service"

[subnets.prime.canisters.test.auth]
delegated_token_verifier = true
role_attestation_cache = true

[subnets.general]
