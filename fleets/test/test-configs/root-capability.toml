controllers = []
app_index = ["scale_hub"]

[app]
init_mode = "enabled"

[app.whitelist]

[auth.delegated_tokens]
enabled = true
ecdsa_key_name = "key_1"

[standards]
icrc21 = true

[subnets.prime]
auto_create = ["app", "scale_hub", "test"]
subnet_index = ["app", "scale_hub", "test"]
pool.minimum_size = 3

[subnets.prime.canisters.root]
kind = "root"

[subnets.prime.canisters.app]
kind = "singleton"
topup = {}

[subnets.prime.canisters.scale_hub]
kind = "singleton"
topup = {}

[subnets.prime.canisters.test]
kind = "singleton"

[subnets.prime.canisters.test.auth]
role_attestation_cache = true

[subnets.general]

[subnets.general.canisters.minimal]
kind = "replica"
