controllers = []
app_index = ["scale_hub"]

[fleet]
name = "test"

[roles.root]
kind = "root"
package = "../root"

[roles.scale_hub]
kind = "canister"
package = "../scale_hub"

[roles.scale_replica]
kind = "canister"
package = "../scale"

[app]
init_mode = "enabled"

[app.whitelist]

[auth.delegated_tokens]
enabled = true

[standards]
icrc21 = true

[subnets.prime]
pool.minimum_size = 3

[subnets.prime.canisters.root]
kind = "root"

[subnets.prime.canisters.scale_hub]
kind = "service"
topup = {}

[subnets.prime.canisters.scale_hub.scaling.pools.scales]
canister_role = "scale_replica"
policy.initial_workers = 1
policy.min_workers = 2

[subnets.prime.canisters.scale_replica]
kind = "replica"
topup = {}

[subnets.general]
