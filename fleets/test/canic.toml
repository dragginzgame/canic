# ================================================================
#  CANIC CONFIGURATION
# ================================================================

# ----------------------------------------------------------------
# Global Settings
# ----------------------------------------------------------------
controllers = []
[services.fleet]
roles = ["user_hub", "scale_hub"]

[app]
name = "test"
init_mode = "enabled"


[roles.root]
kind = "root"
package = "root"

[roles.app]
kind = "canister"
package = "app"

[roles.user_hub]
kind = "canister"
package = "user_hub"

[roles.user_shard]
kind = "canister"
package = "user_shard"

[roles.scale_hub]
kind = "canister"
package = "scale_hub"

[roles.scale_replica]
kind = "canister"
package = "scale"

[roles.test]
kind = "canister"
package = "test"
[app.whitelist]

[auth.delegated_tokens]
# Root-signed delegated token auth (cert -> proof -> token).
enabled = true
build_network = "local"

[auth.delegated_tokens.chain_key_root_proof]
key_id = "key_1"
derivation_path_hash_hex = "fe51a87b988d221227b134c48f36787e891a902dcb5d48ea5f94cff8bfed5a16"
derivation_path_hex = ["63616e6963", "64656c65676174696f6e"]
public_key_hex = "02f1a0a900c4b9d53ff5ec024c0e37e7a54174c6ae1d0a77312aebea349adc0b7a"
key_version = 1
min_accepted_key_version = 1
min_accepted_proof_epoch = 2
min_accepted_registry_epoch = 2
valid_from_ns = 0
accept_until_ns = 4102444800000000000
max_revocation_latency_ns = 60000000000


# ----------------------------------------------------------------
# Standards
# ----------------------------------------------------------------

[standards]
icrc21 = true # Enable ICRC-21 capability

# ----------------------------------------------------------------
# Subnet Definitions
# ----------------------------------------------------------------
# Each subnet defines how its canisters behave and when they top up.
# ----------------------------------------------------------------

# ================================================================
#  PRIME SUBNET
# ================================================================
[subnets.default]
pool.minimum_size = 3

# --- Root ---
[subnets.default.canisters.root]
kind = "root"

# --- App ---
[subnets.default.canisters.app]
kind = "service"
topup = {}

# --- User Hub ---
[subnets.default.canisters.user_hub]
kind = "service"
topup = {}

# --- User Hub Pools ---
[subnets.default.canisters.user_hub.sharding.pools.user_shards]
canister_role = "user_shard"
policy.capacity = 100
policy.initial_shards = 1
policy.max_shards = 4

# --- User Shard ---
[subnets.default.canisters.user_shard]
kind = "shard"
topup = {}

[subnets.default.canisters.user_shard.auth]
delegated_token_issuer = true
delegated_token_verifier = true
role_attestation_cache = true

# --- Scale Hub ---
[subnets.default.canisters.scale_hub]
kind = "service"
topup = {}

# --- Scale Hub Pools ---
[subnets.default.canisters.scale_hub.scaling.pools.scales]
canister_role = "scale_replica"
policy.initial_workers = 1
policy.min_workers = 2

# --- Scale Replica ---
[subnets.default.canisters.scale_replica]
kind = "replica"
topup = {}

# ================================================================
#  GENERAL SUBNET
# ================================================================
[subnets.general]
