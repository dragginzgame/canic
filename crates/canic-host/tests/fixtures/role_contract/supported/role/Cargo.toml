[package]
name = "fixture_supported_role"
version = "0.0.0"
edition = "2024"
publish = false
build = "build.rs"

[package.metadata.canic]
fleet = "fixture_supported"
role = "app"

[lib]
crate-type = ["cdylib"]
path = "src/lib.rs"

[dependencies]
canic = { workspace = true, features = ["metrics"] }
fixture_supported_domain = { path = "../domain" }

[build-dependencies]
canic = { workspace = true, features = [] }

