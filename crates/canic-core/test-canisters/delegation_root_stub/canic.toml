controllers = []
app_directory = []

[auth.delegated_tokens]
enabled = true
ecdsa_key_name = "test_key_1"

[subnets.prime]
auto_create = ["signer"]

[subnets.prime.canisters.root]
kind = "root"

[subnets.prime.canisters.signer]
kind = "singleton"
initial_cycles = "1T"

[subnets.prime.canisters.signer.delegated_auth]
signer = true
verifier = true

[subnets.prime.canisters.project_hub]
kind = "singleton"
initial_cycles = "1T"

[subnets.prime.canisters.project_hub.delegated_auth]
verifier = true
