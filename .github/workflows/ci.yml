name: CI

env:
  CANIC_MSRV: 1.91.0
  CANIC_INTERNAL_TOOLCHAIN: 1.96.0
  CARGO_INCREMENTAL: 0

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:

jobs:
  msrv:
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ env.CANIC_MSRV }}
      - name: Install wasm target
        shell: bash
        run: |
          echo "RUSTUP_TOOLCHAIN=$CANIC_MSRV" >> "$GITHUB_ENV"
          rustup target add --toolchain "$CANIC_MSRV" wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          cache-targets: false
      - name: Check runner disk after Rust cache restore
        shell: bash
        run: bash scripts/ci/check-runner-disk-space.sh --label "MSRV after Rust cache restore" --min-free-mib 3072
      - name: Check workspace MSRV
        run: cargo check --workspace --locked
      - name: Report runner disk at MSRV finish
        if: ${{ always() }}
        shell: bash
        run: bash scripts/ci/check-runner-disk-space.sh --label "MSRV finish"

  checks:
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          clean: true
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ env.CANIC_INTERNAL_TOOLCHAIN }}
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          cache-targets: false
      - name: Check runner disk after Rust cache restore
        shell: bash
        run: bash scripts/ci/check-runner-disk-space.sh --label "checks after Rust cache restore" --min-free-mib 3072
      - name: Install Rust helper tools
        shell: bash
        run: |
          source tool-versions.env
          cargo install cargo-sort --version "$CANIC_CARGO_SORT_VERSION" --locked
          cargo install cargo-sort-derives --version "$CANIC_CARGO_SORT_DERIVES_VERSION" --locked
          cargo install candid-extractor --version "$CANIC_CANDID_EXTRACTOR_VERSION" --locked
          cargo install ripgrep --version "$CANIC_RIPGREP_VERSION" --locked --features pcre2
      - name: Check Rust helper tools
        shell: bash
        run: |
          cargo sort --version
          cargo sort-derives --version
          candid-extractor --version
          rg --version
      - name: Install wasm target
        shell: bash
        run: |
          echo "RUSTUP_TOOLCHAIN=$CANIC_INTERNAL_TOOLCHAIN" >> "$GITHUB_ENV"
          rustup target add --toolchain "$CANIC_INTERNAL_TOOLCHAIN" wasm32-unknown-unknown
      - name: Install actionlint
        shell: bash
        run: |
          BIN="$(bash scripts/ci/install-actionlint.sh)"
          echo "ACTIONLINT_BIN=$BIN" >> "$GITHUB_ENV"
      - name: Lint GitHub Actions workflows
        shell: bash
        run: "$ACTIONLINT_BIN"
      - name: Install Gitleaks
        shell: bash
        run: |
          BIN="$(bash scripts/ci/install-gitleaks.sh)"
          echo "GITLEAKS_BIN=$BIN" >> "$GITHUB_ENV"
      - name: Scan repository history for secrets
        shell: bash
        run: bash scripts/ci/run-secret-scan.sh
      - name: Install IC CLI tools
        shell: bash
        run: |
          bash scripts/ci/install-icp-cli.sh
          bash scripts/ci/install-ic-wasm.sh
      - name: Check IC CLI tools
        run: |
          icp --version
          ic-wasm --version
      - name: Layering guards
        if: ${{ ! startsWith(github.ref, 'refs/tags/') }}
        shell: bash
        run: bash scripts/ci/run-layering-guards.sh
      - name: Control-plane feature matrix
        shell: bash
        run: bash scripts/ci/check-control-plane-feature-matrix.sh
      - name: Blob storage inventory gate
        shell: bash
        run: bash scripts/ci/check-blob-storage-inventory-gate.sh
      - name: Blob storage Cashier inventory gate
        shell: bash
        run: bash scripts/ci/check-blob-storage-cashier-inventory-gate.sh
      - name: Release validation matrix guard
        shell: bash
        run: bash scripts/ci/check-release-validation-matrix.sh
      - name: Release execution integrity guard
        shell: bash
        run: bash scripts/ci/check-release-integrity-contract.sh
      - name: Audit method catalog guard
        shell: bash
        run: bash scripts/ci/check-audit-method-catalog.sh
      - name: Recovery runbooks guard
        shell: bash
        run: bash scripts/ci/check-recovery-runbooks.sh
      - name: Release package/install validation guard
        shell: bash
        run: bash scripts/ci/check-release-package-install-validation.sh
      - name: Check runner disk before Rust validation
        shell: bash
        run: bash scripts/ci/check-runner-disk-space.sh --label "checks before Rust validation" --min-free-mib 4096
      - run: make fmt-check
      - run: make clippy
      - name: Report runner disk at checks finish
        if: ${{ always() }}
        shell: bash
        run: bash scripts/ci/check-runner-disk-space.sh --label "checks finish"

  test-unit:
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          clean: true
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ env.CANIC_INTERNAL_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          cache-targets: false
      - name: Check runner disk after Rust cache restore
        shell: bash
        run: bash scripts/ci/check-runner-disk-space.sh --label "test-unit after Rust cache restore" --min-free-mib 3072
      - name: Install Rust test helper tools
        shell: bash
        run: |
          source tool-versions.env
          cargo install candid-extractor --version "$CANIC_CANDID_EXTRACTOR_VERSION" --locked
      - name: Install wasm target
        shell: bash
        run: |
          echo "RUSTUP_TOOLCHAIN=$CANIC_INTERNAL_TOOLCHAIN" >> "$GITHUB_ENV"
          rustup target add --toolchain "$CANIC_INTERNAL_TOOLCHAIN" wasm32-unknown-unknown
      - name: Install IC CLI tools
        shell: bash
        run: |
          bash scripts/ci/install-icp-cli.sh
          bash scripts/ci/install-ic-wasm.sh
      - name: Check IC CLI tools
        run: |
          candid-extractor --version
          icp --version
          ic-wasm --version
      - name: Cache PocketIC server
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: ${{ runner.temp }}/pocket-ic-server-*
          key: pocket-ic-${{ hashFiles('tool-versions.env') }}-${{ runner.os }}-${{ runner.arch }}
      - name: Install PocketIC server
        shell: bash
        run: |
          BIN="$(bash scripts/ci/install-pocketic.sh)"
          echo "POCKET_IC_BIN=$BIN" >> "$GITHUB_ENV"
      - name: Check runner disk before test-unit
        shell: bash
        run: bash scripts/ci/check-runner-disk-space.sh --label "test-unit before tests" --min-free-mib 4096
      - run: make test-unit
      - name: Report runner disk at test-unit finish
        if: ${{ always() }}
        shell: bash
        run: bash scripts/ci/check-runner-disk-space.sh --label "test-unit finish"

  build:
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          clean: true
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ env.CANIC_INTERNAL_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          cache-targets: false
      - name: Check runner disk after Rust cache restore
        shell: bash
        run: bash scripts/ci/check-runner-disk-space.sh --label "build after Rust cache restore" --min-free-mib 3072
      - name: Install Rust build helper tools
        shell: bash
        run: |
          source tool-versions.env
          cargo install candid-extractor --version "$CANIC_CANDID_EXTRACTOR_VERSION" --locked
      - name: Install wasm target
        shell: bash
        run: |
          echo "RUSTUP_TOOLCHAIN=$CANIC_INTERNAL_TOOLCHAIN" >> "$GITHUB_ENV"
          rustup target add --toolchain "$CANIC_INTERNAL_TOOLCHAIN" wasm32-unknown-unknown
      - name: Install IC CLI tools
        shell: bash
        run: |
          bash scripts/ci/install-icp-cli.sh
          bash scripts/ci/install-ic-wasm.sh
      - name: Check IC CLI tools
        run: |
          candid-extractor --version
          icp --version
          ic-wasm --version
      - name: Check runner disk before build
        shell: bash
        run: bash scripts/ci/check-runner-disk-space.sh --label "build before cargo build" --min-free-mib 4096
      - name: Build examples (default)
        if: ${{ ! startsWith(github.ref, 'refs/tags/') }}
        run: cargo build -p canic --examples --locked
      - name: Build release workspace
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        run: cargo build --release --workspace --locked
      - name: Report runner disk at build finish
        if: ${{ always() }}
        shell: bash
        run: bash scripts/ci/check-runner-disk-space.sh --label "build finish"
