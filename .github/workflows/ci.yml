name: CI

env:
  POCKET_IC_VERSION: 13.0.0

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:

jobs:
  checks:
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.94.1
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install fmt tools
        run: cargo install cargo-sort cargo-sort-derives --locked
      - name: Install wasm target
        run: rustup target add wasm32-unknown-unknown
      - name: Cache PocketIC server
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/pocket-ic-server-${{ env.POCKET_IC_VERSION }}
          key: pocket-ic-${{ env.POCKET_IC_VERSION }}-${{ runner.os }}
      - name: Install PocketIC server
        shell: bash
        run: |
          BIN="$(bash scripts/ci/install-pocketic.sh "$POCKET_IC_VERSION")"
          echo "POCKET_IC_BIN=$BIN" >> "$GITHUB_ENV"
      - name: Build canister wasm artifacts
        shell: bash
        run: bash scripts/ci/build-ci-wasm-artifacts.sh
      - name: Layering guards
        shell: bash
        run: bash scripts/ci/run-layering-guards.sh
      - name: Forbidden crypto API guards
        shell: bash
        run: bash scripts/ci/run-forbidden-crypto-guards.sh
      - run: make fmt-check
      - run: make clippy
      - run: cargo test --workspace --all-targets --verbose --locked -- --test-threads=1
      - name: Build examples (default)
        run: cargo build -p canic --examples --locked

  tag_checks:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: true
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.94.1
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install fmt tools
        run: cargo install cargo-sort cargo-sort-derives --locked
      - name: Install wasm target
        run: rustup target add wasm32-unknown-unknown
      - name: Cache PocketIC server
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/pocket-ic-server-${{ env.POCKET_IC_VERSION }}
          key: pocket-ic-${{ env.POCKET_IC_VERSION }}-${{ runner.os }}
      - name: Install PocketIC server
        shell: bash
        run: |
          BIN="$(bash scripts/ci/install-pocketic.sh "$POCKET_IC_VERSION")"
          echo "POCKET_IC_BIN=$BIN" >> "$GITHUB_ENV"
      - name: Build canister wasm artifacts
        shell: bash
        run: bash scripts/ci/build-ci-wasm-artifacts.sh
      - name: Forbidden crypto API guards
        shell: bash
        run: bash scripts/ci/run-forbidden-crypto-guards.sh
      - run: make fmt-check
      - run: make clippy
      - run: cargo test --workspace --all-targets --verbose --locked -- --test-threads=1
      - run: cargo build --release --workspace --locked
